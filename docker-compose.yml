version: '3.8'
services:
  postgres_db:
    image: postgres:15-alpine
    container_name: syncdata_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # SECURE BINDING
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis_cache:
    image: redis:7-alpine
    container_name: syncdata_redis
    ports:
      # SECURE BINDING: Redis es muy vulnerable si se expone a internet
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: